<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MediBridge Pharmacy Dashboard - Manage your medicine inventory and track redistribution requests.">
    <title>MediBridge | Pharmacy Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar-custom">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand" href="/pharmacy-dashboard">Medi<span>Bridge</span></a>
    <div class="d-flex align-items-center gap-2">
      <a href="/pharmacy-dashboard" class="btn-nav active">Dashboard</a>
      <a href="/pharmacy-requests-page" class="btn-nav">Requests</a>
      <button class="btn-nav" onclick="logout()">Logout</button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
</nav>

<div class="container mt-4 fade-in">

    <h1 class="page-title">Pharmacy Dashboard</h1>
    <p class="page-subtitle">Manage your medicine inventory and track requests</p>

    <!-- STAT CARDS -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="glass-card stat-card">
                <div class="stat-value" id="total">–</div>
                <div class="stat-label">Total Medicines</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass-card stat-card">
                <div class="stat-value" id="near" style="color: #d97706;">–</div>
                <div class="stat-label">Near Expiry</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass-card stat-card">
                <div class="stat-value" id="expired" style="color: #dc2626;">–</div>
                <div class="stat-label">Expired</div>
            </div>
        </div>
    </div>

    <!-- ALERTS -->
    <div id="expiryAlert" class="mb-4"></div>

    <!-- TOOLBAR -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="search-wrapper">
            <input type="text" id="searchMedicine" class="search-box" placeholder="Search medicine..." onkeyup="searchMedicine()">
        </div>
        <button class="btn-accent" data-bs-toggle="modal" data-bs-target="#addMedicineModal">
            + Add Medicine
        </button>
    </div>

    <!-- ADD MEDICINE MODAL -->
    <div class="modal fade modal-custom" id="addMedicineModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Add New Medicine</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="addMedicineForm">
              <div class="mb-3">
                  <label class="form-label-custom">Medicine Name</label>
                  <input class="form-control-custom" id="medicine_name" placeholder="e.g. Paracetamol 500mg" required>
              </div>
              <div class="row g-3">
                  <div class="col-6">
                      <label class="form-label-custom">Quantity</label>
                      <input class="form-control-custom" id="quantity" type="number" min="1" placeholder="0" required>
                  </div>
                  <div class="col-6">
                      <label class="form-label-custom">Expiry Date</label>
                      <input class="form-control-custom" id="expiry_date" type="date" required>
                  </div>
                  <div class="col-6">
                      <label class="form-label-custom">Original Price (₹)</label>
                      <input class="form-control-custom" id="original_price" type="number" min="0" step="0.01" placeholder="0.00" required>
                  </div>
                  <div class="col-6">
                      <label class="form-label-custom">Discount Price (₹)</label>
                      <input class="form-control-custom" id="discount_price" type="number" min="0" step="0.01" placeholder="0.00" required>
                  </div>
              </div>
              <button type="submit" class="btn-accent w-100 mt-3" id="addMedBtn">Add Medicine</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- INVENTORY TABLE -->
    <h4 class="section-title">Medicine Inventory</h4>
    <div class="table-container">
        <table class="table-modern">
          <thead>
            <tr>
              <th>Name</th>
              <th>Qty</th>
              <th>Expiry Date</th>
              <th>Price</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="medicineTable">
            <tr><td colspan="6">
                <div class="spinner-container"><div class="spinner"></div></div>
            </td></tr>
          </tbody>
        </table>
    </div>
</div>

<!-- FOOTER -->
<footer class="footer-custom mt-5">
    © 2026 MediBridge
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ===== Theme =====
function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
}
(function() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = saved === 'dark' ? '☀️' : '🌙';
})();

// ===== Toast =====
function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast-custom toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// ===== Auth =====
function logout(){
    localStorage.clear();
    window.location.href = "/login-page";
}

// ===== Add Medicine =====
document.getElementById("addMedicineForm").onsubmit = async function(e){
    e.preventDefault();

    const btn = document.getElementById("addMedBtn");
    btn.disabled = true;
    btn.textContent = "Adding...";

    let user_id = localStorage.getItem("user_id");

    try {
        let res = await fetch("/api/add-medicine", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                medicine_name: document.getElementById("medicine_name").value,
                quantity: document.getElementById("quantity").value,
                expiry_date: document.getElementById("expiry_date").value,
                original_price: document.getElementById("original_price").value,
                discount_price: document.getElementById("discount_price").value,
                user_id: user_id
            })
        });

        let data = await res.json();

        if(res.ok){
            showToast("✅ " + data.message);
            document.getElementById("addMedicineForm").reset();
            // Close modal
            bootstrap.Modal.getInstance(document.getElementById("addMedicineModal")).hide();
            loadMedicines();
        } else {
            showToast(data.message, 'error');
        }
    } catch(err) {
        showToast("Server error. Check Flask terminal.", 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = "Add Medicine";
    }
}

// ===== Load Medicines =====
async function loadMedicines(){
    let user_id = localStorage.getItem("user_id");

    try {
        let res = await fetch(`/api/get-medicines/${user_id}`);
        let data = await res.json();

        let table = document.getElementById("medicineTable");
        table.innerHTML = "";

        if(data.length === 0) {
            table.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">💊</div><p>No medicines added yet. Click "Add Medicine" to get started.</p></div></td></tr>`;
            document.getElementById("total").innerText = "0";
            document.getElementById("near").innerText = "0";
            document.getElementById("expired").innerText = "0";
            return;
        }

        let total = 0, near = 0, expired = 0;

        data.forEach(med => {
            total++;
            if(med.status === "NEAR_EXPIRY") near++;
            if(med.status === "EXPIRED") expired++;

            let badge = '';
            if(med.status === "SAFE") badge = '<span class="badge-status badge-safe">● Safe</span>';
            else if(med.status === "NEAR_EXPIRY") badge = '<span class="badge-status badge-near">⚠ Near Expiry</span>';
            else badge = '<span class="badge-status badge-expired">✕ Expired</span>';

            table.innerHTML += `
            <tr>
                <td><strong>${med.medicine_name}</strong></td>
                <td>${med.quantity}</td>
                <td>${med.expiry_date}</td>
                <td>₹${med.discount_price || med.original_price}</td>
                <td>${badge}</td>
                <td><button class="btn-action btn-delete" onclick="deleteMedicine(${med.medicine_id})">Delete</button></td>
            </tr>`;
        });

        // Alerts
        let alertBox = document.getElementById("expiryAlert");
        alertBox.innerHTML = "";

        if(expired > 0){
            alertBox.innerHTML += `<div class="alert-custom alert-danger-custom">❌ ${expired} medicine(s) have expired. Please remove or dispose them.</div>`;
        }
        if(near > 0){
            alertBox.innerHTML += `<div class="alert-custom alert-warning-custom mt-2">⚠️ ${near} medicine(s) are near expiry. Consider redistribution or discount.</div>`;
        }

        document.getElementById("total").innerText = total;
        document.getElementById("near").innerText = near;
        document.getElementById("expired").innerText = expired;

    } catch(err) {
        showToast("Failed to load medicines", 'error');
    }
}

loadMedicines();

// ===== Delete Medicine =====
async function deleteMedicine(id){
    if(!confirm("Are you sure you want to delete this medicine?")) return;

    try {
        await fetch(`/api/delete-medicine/${id}`, { method: "DELETE" });
        showToast("🗑️ Medicine deleted");
        loadMedicines();
    } catch(err) {
        showToast("Failed to delete", 'error');
    }
}

// ===== Search =====
function searchMedicine(){
    const query = document.getElementById("searchMedicine").value.toLowerCase();
    const rows = document.querySelectorAll("#medicineTable tr");

    rows.forEach(row => {
        const name = row.cells?.[0]?.textContent?.toLowerCase() || '';
        row.style.display = name.includes(query) ? '' : 'none';
    });
}
</script>

</body>
</html>
