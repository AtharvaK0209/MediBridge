<!DOCTYPE html>
<html>
<head>
    <title>Login | MediBridge</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-success shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/">MediBridge</a>
  </div>
</nav>

<div class="container mt-5">
    <div class="col-md-5 mx-auto">
        <div class="form-card">

            <h3 class="text-center text-success mb-4">Login</h3>

            <form id="loginForm">
                <input class="form-control mb-3" id="email" placeholder="Email" required>
                <input type="password" class="form-control mb-3" id="password" placeholder="Password" required>

                <button type="submit" class="btn btn-success w-100">Login</button>
            </form>

        </div>
    </div>
</div>

<footer class="bg-success text-white text-center py-3 mt-5">
    © 2026 MediBridge
</footer>

<script>
document.getElementById("loginForm").onsubmit = async function(e){
e.preventDefault();

let res = await fetch("/login-page",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email: email.value,
password: password.value
})
});

let data = await res.json();

if(res.ok){
alert("Login successful");

// Store user info in localStorage
localStorage.setItem("user_id", data.user_id);
localStorage.setItem("role", data.role);

// Redirect based on role
if(data.role === "pharmacy"){
window.location.href="/pharmacy-dashboard";
}
else if(data.role === "ngo"){
window.location.href="/ngo-dashboard";
}

}else{
alert(data.message);
}
}
</script>

</body>
</html>
