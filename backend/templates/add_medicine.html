<!DOCTYPE html>
<html>
<body>

<h2>Add Medicine</h2>

<form id="medicineForm">

<input placeholder="Medicine Name" id="name"><br><br>
<input placeholder="Barcode" id="barcode"><br><br>
<input placeholder="Quantity" id="quantity" type="number"><br><br>
<input type="date" id="expiry"><br><br>
<input placeholder="Original Price" id="price"><br><br>
<input placeholder="Discount Price" id="discount"><br><br>

<button type="submit">Add</button>

</form>

<script>
document.getElementById("medicineForm").onsubmit = async function(e){
e.preventDefault();

await fetch("http://127.0.0.1:5000/add_medicine",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({
pharmacy_id:1,
barcode:barcode.value,
medicine_name:name.value,
quantity:quantity.value,
expiry_date:expiry.value,
original_price:price.value,
discount_price:discount.value
})
});

alert("Medicine Added!");
}
</script>

</body>
</html>
